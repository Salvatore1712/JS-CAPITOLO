    <form>
        <label for="name">name</label>

    <script>   
        // aggiunge evento al genitore e con event.target si risale a quale tag è accaduto l'evento
        // cattura lista
        const lista = document.querySelector(".lista")

        //eventListner alla lista principale
        lista.addEventListener("click", function(eventi) {
            let eleClick = event.target;
            if (eleClick.tagName === "LI") {
                console.log(eleClick)
            }
        })

        let form = document.querySelector("form");
        let nameForm = document.getElementById("name");

        form.onsubmit = function (event) {
            if (nameForm.valeu === "") {
                event.preventDefault();
                console.log("ERRORE")
            }
        }

    </script>
</body>
