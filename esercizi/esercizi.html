<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizi Javascript</title>
    <style>
        .risposta {
            color: red;
            font-size: 30px;
        }
    </style>
</head>
<body>
    
    <h1>SEI PRONTA PER TINDER??</h1>
    <p>L'estate si avvicina...</p>
    <p class="risposta" style="color: red;"></p>

    <script>
        function messaggio (domanda, yes, no) {
            if(confirm(domanda)) {
                yes()
            } else no()
        }

        function heSaidYes () {
            alert("Hai accettato");
        }

        function heSaidNo () {
            alert("Hai declinato");
        }

        messaggio("Sei bello?", heSaidYes, heSaidNo)
    </script>
</body>
</html>
