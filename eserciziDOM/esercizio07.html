<!-- 
 Esercizio 7 — Eliminare elementi
HTML
<ul id="lista">
  <li>Pane</li>
  <li>Pasta</li>
  <li>Latte</li>
</ul>
Obiettivo
Cliccando su un elemento della lista, esso deve essere eliminato.
Concetti
addEventListener
remove()
event.target
 -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESERCIZIO 07</title>
 </head>
 <body>
    <ul id="lista">
        <li>Pane</li>
        <li>Pasta</li>
        <li>Latte</li>
    </ul>


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            //seleziona elementi
            let listaUl = document.querySelector("#lista")

            listaUl.addEventListener("click", (event) => {
                let elSelected = event.target;
                listaUl.remove(elSelected)
            })



        })


    </script>
 </body>
 </html>
